<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Agenda Guirbaden</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Admin - Utilisateurs & Dates</h1>
        <p id="sync-status" style="font-size: 12px; color: gray;">Synchronisation...</p>

        <div class="admin-controls">
            <div>
                <h2>Utilisateurs</h2>
                <input type="text" id="new-user-input" placeholder="Ajouter un utilisateur...">
                <button id="add-user-btn">Ajouter</button>
                <ul id="user-list"></ul>
            </div>
            <div>
                <h2>Dates</h2>
                <div class="month-row">
                    <label for="admin-month-picker">Mois :</label>
                    <button id="admin-prev-month-btn" class="month-nav-btn" type="button">◀</button>
                    <input type="month" id="admin-month-picker">
                    <button id="admin-next-month-btn" class="month-nav-btn" type="button">▶</button>
                </div>
                <div id="date-grid" class="date-grid"></div>
            </div>
        </div>

        <a href="index.html" class="admin-link">Retour au planning</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="admin.js"></script>
</body>
</html>
