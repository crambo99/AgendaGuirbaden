<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Partagé - Guirbaden</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>Chantiers et Permanences Guirbaden</h1>
        <p id="sync-status" style="font-size: 12px; color: gray;">Synchronisation...</p>
        
        <div class="controls">
            <label for="month-picker">Mois :</label>
            <button id="prev-month-btn" class="month-nav-btn" type="button">◀</button>
            <input type="month" id="month-picker">
            <button id="next-month-btn" class="month-nav-btn" type="button">▶</button>
        </div>

        <div class="table-wrapper">
            <table id="schedule-table">
                <thead>
                    <tr id="header-row-1"></tr>
                    <tr id="header-row-2"></tr>
                    <tr id="header-row-3"></tr>
                </thead>
                <tbody id="table-body">
                </tbody>
            </table>
        </div>
    </div>

    <!-- Firebase SDK (version compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="script.js"></script>
</body>

</html>
