<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Partagé - Guirbaden</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>Chantiers et Permanences Guirbaden - Juin 2026</h1>
        <p id="sync-status" style="font-size: 12px; color: gray;">Synchronisation...</p>
        
        <div class="controls">
            <input type="text" id="user-input" placeholder="Ajouter un utilisateur...">
            <button id="add-user-btn">Ajouter</button>
        </div>

        <div class="table-wrapper">
            <table id="schedule-table">
                <thead>
                    <tr id="header-row-1"></tr>
                    <tr id="header-row-2"></tr>
                </thead>
                <tbody id="table-body">
                </tbody>
            </table>
        </div>
    </div>

    <!-- Firebase SDK (version compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="script.js"></script>
</body>

</html>
